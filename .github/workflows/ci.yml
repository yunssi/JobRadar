name: Quality Checks

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install locked dependencies
        run: |
          uv sync --locked --dev
          npm ci --ignore-scripts

      - name: Lint
        run: |
          uv run ruff check .
          npm run lint

      - name: Typecheck
        run: |
          uv run mypy monitor.py tests/test_monitor.py
          npm run typecheck

      - name: Test
        run: |
          uv run python -m unittest discover -s tests -v
          npm test

      - name: Build
        run: npm run build
